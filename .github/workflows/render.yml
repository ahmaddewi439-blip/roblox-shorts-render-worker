name: Render Roblox Shorts Video

on:
  workflow_dispatch:
    inputs:
      job_payload:
        description: "Full selected-rank render payload JSON from Vercel"
        required: true
        default: "{}"

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg python3-pip fonts-dejavu-core
          python3 -m pip install --upgrade pip
          python3 -m pip install gdown pillow requests edge-tts

      - name: Create folders
        run: |
          mkdir -p input output assets audio temp

      - name: Save selected rank job payload
        env:
          JOB_PAYLOAD: ${{ github.event.inputs.job_payload }}
        run: |
          python3 - <<'PY'
          import os, json
          raw = os.environ.get("JOB_PAYLOAD", "{}")
          data = json.loads(raw)
          with open("input/job_payload.json", "w", encoding="utf-8") as f:
              json.dump(data, f, ensure_ascii=False, indent=2)
          print("Job ID:", data.get("jobId"))
          print("Topic:", data.get("topic"))
          print("Selected rank:", data.get("selectedRank"))
          print("Gameplay URLs:", len(data.get("gameplayUrls", [])))
          print("Scenes:", len(data.get("scenes", [])))
          PY

      - name: Render full selected-rank video
        run: |
          python3 render_full_selected_rank.py input/job_payload.json output/final_video.mp4

      - name: Final video quality check
        run: |
          echo "===================================================="
          echo "FINAL VIDEO QUALITY CHECK"
          echo "Project: GitHub Full Selected Rank Render"
          echo "===================================================="
          test -f output/final_video.mp4 && echo "PASS | Final video found | output/final_video.mp4"
          echo "PASS | Final video size | $(du -h output/final_video.mp4 | cut -f1)"
          echo "Resolution:"
          ffprobe -v error -select_streams v:0 -show_entries stream=width,height -of csv=s=x:p=0 output/final_video.mp4
          echo "Duration:"
          ffprobe -v error -show_entries format=duration -of default=nw=1:nk=1 output/final_video.mp4
          echo "===================================================="
          echo "CHECK DONE"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: render-${{ github.run_id }}
          name: Render Output ${{ github.run_id }}
          files: output/final_video.mp4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Show final URL
        run: |
          echo "===================================================="
          echo "FINAL VIDEO URL"
          echo "https://github.com/${{ github.repository }}/releases/download/render-${{ github.run_id }}/final_video.mp4"
          echo "===================================================="
